<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! - NoCodeLab</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f9fafb;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            color: #111;
        }
        p {
            color: #666;
            font-size: 18px;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .email-note {
            background: #FEF3C7;
            padding: 16px;
            border-radius: 8px;
            font-size: 14px;
            color: #92400E;
            margin-bottom: 24px;
        }
        a {
            display: inline-block;
            background: #4F46E5;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            background: #4338CA;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎉 Thank You!</h1>
        <p>Your payment was successful. Check your email for download instructions and access to your products.</p>
        <div class="email-note">
            <strong>Didn't receive the email?</strong><br>
            Check your spam folder or contact support@nocodelab.tech
        </div>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
